<html>
<style>
html, body {
  background-color: gray;
  overflow: hidden;
}
#tu1 {
position: absolute;
width: 101%;
height: 100%;
left: -0.5%;
top: 0%;
}
</style>
<body>
<audio id="bgm1"></audio>
<iframe src='new EventTag2.html' id="tu1"></iframe>
<script>
var Pvar = "funLoad2.js"; 
let iframe = document.getElementById("tu1");
let bgm1 = document.getElementById("bgm1");

window.addEventListener('message', (event) => {
if(event.data[1] === "BGM"){
bgm1.src = event.data[0];
}
if(event.data[1] === "funC"){
Pvar = event.data[0];
iframe.contentWindow.fun = Pvar;
}

});

//iframe.contentWindow.fun = Pvar;

</script>
</body>
</html>
